apiVersion: apps/v1
kind: Deployment
metadata:
  name: mood
  namespace: backend
  labels:
    app: mood
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mood
  template:
    metadata:
      labels:
        app: mood
    spec:
      containers:
        - name: mood
          image: mood:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: mood-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: mood-config
                  key: REDIS_PORT
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: mood-config
                  key: MYSQL_HOST
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mood-config
                  key: MYSQL_DATABASE
            - name: REACTIONS_SVC_URL
              valueFrom:
                configMapKeyRef:
                  name: mood-config
                  key: REACTIONS_SVC_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mood-secret
                  key: REDIS_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mood-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mood-secret
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mood-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mood-svc
  namespace: backend
spec:
  type: ClusterIP
  selector:
    app: mood
  ports:
    - port: 8080
      targetPort: 8080
      name: http
